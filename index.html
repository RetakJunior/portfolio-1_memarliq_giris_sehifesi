    <link rel="stylesheet" href="style.css" />
    <style>
      /* Hide navigation items on devices narrower than 764px */
      @media (max-width: 764px) {
        .navbar ul {
          display: none;
        }
        .navbar .logo {
          text-align: left;
          font-size: 1.5em;
          display: flex;
          position: absolute;
          top: 20px;
          left: 20px;
        }
        .mid h2 {
          font-size: 2em;
        }
        .mid p {
          font-size: 1em;
        }
        .mid {
          position: relative;
        }
        .buttons button {
          font-size: 1em;
          margin-top: 80px;
        }
      }
    </style>
    <title>Memarlıq Səhifəsi</title>
  </head>

          <li><a href="#">Əlaqə Yaratmaq</a></li>
          <li><a href="#">Daha Çoxu</a></li>
        </ul>
      </div>
      <div class="mid">
        <h2>Öz Evinin Memarı ol</h2>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quis, nemo!
        </p>
        <div class="buttons">
          <button><span></span> Başla!</button>
        </div>
      </div>
    </div>
  </body>
</html>
